<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<canvas id="birthday"></canvas>

<!-- Start Button -->
<button id="startBtn">Click Me 💖</button>

<!-- Birthday Card -->
<div id="card">
  <button id="closeCard">✖</button>
  <div class="paper">
    <h2>Happy Birthday!</h2>
    <p>
      My binbin unnie, this is our 6th year bwing friend, besties, and sisters. I hope this year brings you happiness, adventures, and
      many beautiful moments. I hope we also spend many more good moments together. I'm really grateful to have you
      in my life pookie 💖<br>
      생일 축한다 🥳🎂🎈🎉<br>
      우리 서빈아 💋🥰💌
    </p>
    <div class="photos">
      <img src="photo1.jpg" alt="Photo 1">
      <img src="photo2.jpg" alt="Photo 2">
    </div>
  </div>
</div>

<script src="script.js"></script>

  <!-- Add this before closing body tag -->
<audio id="birthdaySong" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>
  
</body>
</html>
